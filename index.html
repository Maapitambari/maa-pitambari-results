<!DOCTYPE html>
<html>
<head>
    <title>Maa Pitambari Coaching Centre</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Maa Pitambari Coaching Centre</h1>
<h2>Student Result Portal</h2>

<input type="text" id="searchBox" placeholder="Enter Name or Roll No">
<select id="classFilter">
    <option value="">All Classes</option>
    <option value="10">Class 10</option>
    <option value="9">Class 9</option>
    <option value="8">Class 8</option>
</select>

<button onclick="searchResult()">Search</button>

<table id="resultTable">
    <thead>
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Class</th>
            <th>Marks</th>
            <th>Result</th>
            <th>Download</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<p id="noResult" style="display:none; color:red;">No result found</p>

<script src="script.js"></script>

</body>
</html>
